services:
  postgres:
    image: postgres:15-alpine
    container_name: restaurant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: restaurant_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - restaurant-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restaurant-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/restaurant_db
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-in-production
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3001:3000"
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - restaurant-network
    command: ["node", "-r", "ts-node/register", "src/main.ts"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: restaurant-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://restaurant-backend:3000
    ports:
      - "3200:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - restaurant-network
    command: npm run dev

volumes:
  postgres_data:

networks:
  restaurant-network:
    driver: bridge
